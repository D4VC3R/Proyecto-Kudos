name: Generate API Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Documentation (phpDocumentor)
        run: |
          docker run --rm -v ${{ github.workspace }}:/data phpdoc/phpdoc:3 \
            -d ./Backend/app/Http/Controllers \
            -d ./Backend/app/Models \
            -d ./Backend/app/Http/Middleware \
            -d ./Backend/app/Http/Requests \
            -d ./Backend/app/Http/Resources \
            -d ./Backend/app/Policies \
            -d ./Backend/app/Providers \
            -d ./Backend/app/Services \
            -d ./Backend/app/Repositories \
            -d ./Backend/routes \
            -d ./Backend/database/migrations \
            -d ./Backend/database/seeders \
            -d ./Backend/database/factories \
            -t ./Backend/docs/api \
            --template="clean" \
            --title="Proyecto Kudos - API Documentation" \
            --ignore="vendor/*,storage/*,bootstrap/cache/*,node_modules/*"

      - name: Create .nojekyll file
        run: touch ./Backend/docs/.nojekyll

      - name: List generated files
        run: |
          echo "=== Documentation files generated ==="
          ls -la ./Backend/docs/api
          echo "=== Index.html check ==="
          test -f ./Backend/docs/api/index.html && echo "✓ index.html exists" || echo "✗ index.html missing"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Backend/docs/api'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4